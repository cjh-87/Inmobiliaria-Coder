{% extends 'base.html' %}


{% block contenido %}


<div class="container mt-4">

    <h2>Clientes</h2>


    <a class="btn btn-primary mb-3" href="/clientes/crear/">
        Nuevo Cliente
    </a>


    <table class="table table-striped">

        <thead>

            <tr>

                <th>Nombre</th>

                <th>Apellido</th>

                <th>Email</th>

                <th>Teléfono</th>

            </tr>

        </thead>


        <tbody>


            {% for cliente in clientes %}

            <tr>

                <td>{{ cliente.nombre }}</td>

                <td>{{ cliente.apellido }}</td>

                <td>{{ cliente.email }}</td>

                <td>{{ cliente.telefono }}</td>

            </tr>


            {% empty %}

            <tr>

                <td colspan="4">
                    No hay clientes cargados
                </td>

            </tr>


            {% endfor %}


        </tbody>


    </table>


</div>


{% endblock %}
